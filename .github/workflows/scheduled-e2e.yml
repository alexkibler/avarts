name: Scheduled E2E Tests

on:
  schedule:
    # Run every day at 8:00 AM UTC (4:00 AM EST)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  smoke-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Start PocketBase
        run: |
          chmod +x ./db/pocketbase
          ./db/pocketbase serve --dir=./db/pb_data --http=127.0.0.1:8090 &
          echo "Waiting for PocketBase to start..."
          timeout 30s bash -c 'until curl -sf http://127.0.0.1:8090/api/health > /dev/null; do sleep 1; done'
          echo "PocketBase is up!"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E suite
        # BASE_URL=localhost triggers playwright to auto-start the dev server.
        # PUBLIC_DB_URL overrides the hardcoded prod PocketBase in playwright.config.ts
        # so the app connects to the local PocketBase we just started.
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:5173
          PUBLIC_DB_URL: http://127.0.0.1:8090
          TEST_PB_URL: http://127.0.0.1:8090
          TEST_ADMIN_EMAIL: admin@bikeapelago.lan
          TEST_ADMIN_PASSWORD: adminadmin

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
