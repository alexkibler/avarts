name: Scheduled E2E Tests

on:
  schedule:
    # Run every day at 8:00 AM UTC (4:00 AM EST)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  smoke-test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Start Docker services
        run: docker compose up -d

      - name: Create PocketBase admin account
        run: |
          curl -X POST http://127.0.0.1:8090/api/admins \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@bikeapelago.lan","password":"adminadmin","passwordConfirm":"adminadmin"}'
          echo "Admin account created!"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Wait for PocketBase to be ready
        run: |
          echo "Waiting for PocketBase to start..."
          timeout 30s bash -c 'until curl -s http://127.0.0.1:8090/api/health > /dev/null; do sleep 1; done'
          echo "PocketBase is up!"

      - name: Run E2E suite
        run: npm run test:e2e
        env:
          TEST_BASE_URL: http://localhost:5173
          TEST_PB_URL: http://127.0.0.1:8090
          TEST_ADMIN_EMAIL: admin@bikeapelago.lan
          TEST_ADMIN_PASSWORD: adminadmin

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
