name: E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Start Docker services
      run: docker compose up -d

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Wait for PocketBase to be ready
      run: |
        echo "Waiting for PocketBase to start..."
        timeout 30s bash -c 'until curl -s http://127.0.0.1:8090/api/health > /dev/null; do sleep 1; done'
        echo "PocketBase is up!"

    - name: Run Playwright tests
      run: npm run test:e2e -- --project=chromium
      env:
        TEST_BASE_URL: http://localhost:5173
        TEST_PB_URL: http://127.0.0.1:8090
        TEST_ADMIN_EMAIL: admin@bikeapelago.lan
        TEST_ADMIN_PASSWORD: adminadmin

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
